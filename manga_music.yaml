i2c:
  sda: GPIO18
  scl: GPIO23
  frequency: 100kHz
  id: bus_a
   
display:
  - platform: ssd1306_i2c
    id: my_display
    model: "SH1106_128x64"
    address: 0x3C
    update_interval: 500ms
    lambda: |-
      const int visible_chars = 21;
      const uint32_t now = millis();
      it.fill(COLOR_OFF);

      auto scroll_text = [&](const std::string &text) -> std::string {
        if (text.empty()) return std::string("");
        if (text.size() <= visible_chars) return text;
        const int max_offset = text.size() - visible_chars;
        const int step = (now / 350);
        const int period = max_offset * 2;
        int offset = (period > 0) ? (step % period) : 0;
        if (offset > max_offset) offset = period - offset;
        return text.substr(offset, visible_chars);
      };
      auto is_valid = [&](const std::string &text) -> bool {
        return !text.empty() && text != "unknown" && text != "unavailable" && text != "None";
      };

      std::string title = id(ma_media_title).state;
      std::string artist = id(ma_media_artist).state;
      std::string album_name = id(ma_media_album_name).state;
      float volume_level = id(ma_volume_level).state;

      if (!is_valid(title)) title = "";
      if (!is_valid(artist)) artist = "";
      if (!is_valid(album_name)) album_name = "";
      if (volume_level != volume_level) volume_level = id(Vol);

      std::string line1;
      std::string line2;
      line1 = album_name;
      if (!artist.empty() && !title.empty() && artist != title) {
        bool show_artist = ((now / 3000) % 2) == 1;
        line2 = show_artist ? artist : title;
      } else {
        line2 = title;
      }

      int vol_percent = int(volume_level * 100.0f + 0.5f);
      if (vol_percent < 0) vol_percent = 0;
      if (vol_percent > 100) vol_percent = 100;
      std::string volume_line = "Volume: " + std::to_string(vol_percent) + "%";

      it.printf(0, 0, id(ui_font_small), "%s", scroll_text(line1).c_str());
      it.printf(0, 20, id(ui_font_small), "%s", scroll_text(line2).c_str());
      it.printf(0, 40, id(ui_font_small), "%s", scroll_text(volume_line).c_str());

text_sensor:
  - platform: homeassistant
    id: ma_media_content_id
    entity_id: ${music_assistant_player_entity}
    attribute: media_content_id
    internal: true
    on_value:
      then:
        - lambda: |-
            // Mark content change and clear stale metadata with a short grace period.
            id(meta_content_change_ms) = millis();
        - script.execute: clear_stale_metadata
        - component.update: my_display
  - platform: homeassistant
    id: ma_media_title
    entity_id: ${music_assistant_player_entity}
    attribute: media_title
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: ma_media_artist
    entity_id: ${music_assistant_player_entity}
    attribute: media_artist
    internal: true
    on_value:
      then:
        - lambda: |-
            id(meta_artist_update_ms) = millis();
        - component.update: my_display
  - platform: homeassistant
    id: ma_media_album_name
    entity_id: ${music_assistant_player_entity}
    attribute: media_album_name
    internal: true
    on_value:
      then:
        - lambda: |-
            id(meta_album_update_ms) = millis();
        - component.update: my_display
      
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO25
    i2s_bclk_pin:  GPIO5

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO26
    dac_type: external
    channel: stereo
    buffer_duration: 300ms

  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixer_input
      - id: media_mixer_input

  - platform: resampler
    id: media_resampling_input
    output_speaker: media_mixer_input
    sample_rate: 48000

  - platform: resampler
    id: announcement_resampling_input
    output_speaker: announcement_mixer_input    
    sample_rate: 48000

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true
  kalman_process_error: 0.01

media_source:
  - platform: sendspin
    id: sendspin_source
  - platform: http_request
    id: http_source
    buffer_size: 500000
  - platform: file
    id: file_source
    files:
      - id: ready_sound
        file: ${startup_sound_file}

media_player:
  - platform: sendspin
    id: sendspin_media_player
  - platform: speaker_source
    name: none
    id: external_media_player
    announcement_speaker: announcement_resampling_input
    media_speaker: media_resampling_input

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    media_pipeline:
      format: FLAC
      num_channels: 2      
      sample_rate: 48000

    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.9
    sources:
      - http_source
      - sendspin_source
      - file_source
    on_state:
      then:
        - lambda: |-
            using media_player::MediaPlayerState;
            auto state = id(external_media_player).state;
            if (
              state == MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING ||
              state == MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING
            ) {
              id(led_green).execute();
            } else {
              id(led_red).execute();
            }
            
            
sensor:
  - platform: homeassistant
    id: ma_volume_level
    entity_id: ${music_assistant_player_entity}
    attribute: volume_level
    internal: true
    on_value:
      then:
        - component.update: my_display
  - platform: rotary_encoder
    name: "Volume"
    id: volume_encoder
    pin_a:
      number: GPIO19
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO32
      mode:
        input: true
        pullup: true
    on_anticlockwise:
      then:
        - lambda: |-
                id(Vol) -= 0.02;
                if(id(Vol) < 0) id(Vol) = 0;
#        - script.execute: volume_display                          
        - media_player.volume_set:
                id: external_media_player
                volume: !lambda "return id(Vol);"
#        - script.execute: schedule_volume_update
    on_clockwise:
      then:
        - lambda: |-
                id(Vol) += 0.02;
                if(id(Vol) > 1) id(Vol) = 1;
#        - script.execute: volume_display                          
        - media_player.volume_set:
                id: external_media_player
                volume: !lambda "return id(Vol);"
#        - script.execute: schedule_volume_update            

  - platform: adc
    pin: GPIO33 
    name: Battery
    icon: "mdi:battery-outline"
    update_interval: 15s
    accuracy_decimals: 3
    attenuation: 11db
    raw: true
    filters:
    - multiply: 0.00173913 # 2300 -> 4, for attenuation 11db, based on Olivier's code
    - exponential_moving_average:
        alpha: 0.2
        send_every: 2
    - delta: 0.002            
            
            
script:
  - id: clear_stale_metadata
    mode: restart
    then:
      - delay: 1200ms
      - lambda: |-
          const uint32_t content_ts = id(meta_content_change_ms);
          // 500ms slack: handles metadata callbacks arriving just before/after content id update.
          if (id(meta_album_update_ms) + 500 < content_ts) {
            id(ma_media_album_name).publish_state("");
          }
          if (id(meta_artist_update_ms) + 500 < content_ts) {
            id(ma_media_artist).publish_state("");
          }
      - component.update: my_display
  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - lambda: |-
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("file://" + sound_file)
              .set_announcement(true)
              .perform();
          }
  - id: led_red
    then:
      - light.turn_on:
          id: led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 100%

  - id: led_green
    then:
      - light.turn_on:
          id: led
          red: 0%
          green: 100%
          blue: 0%
          brightness: 100%

switch:
  - platform: template
    id: startup_sound_switch
    name: Startup sound
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

globals:
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"
  - id: Vol
    type: float
    initial_value: '0.6'    
  - id: phase
    type: int
    initial_value: '0'    
  - id: mute  
    type: bool
    initial_value: 'false'  
  - id: meta_content_change_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_album_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_artist_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
    
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO00
      inverted: true
      mode:
        input: true
        output: false
        open_drain: false
        pullup: true
        pulldown: false
      drive_strength: 20.0
    name: Button
    on_press:
      then:
        - media_player.toggle: sendspin_media_player


light:
  - platform: esp32_rmt_led_strip
    id: led
    name: LED light
    disabled_by_default: false
    entity_category: config
    pin: GPIO22
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
